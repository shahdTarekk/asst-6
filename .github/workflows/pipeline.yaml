name: shahd
on: 
 push:
  branches: [main]
jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
     - name: checkout code
       uses: actions/checkout@v4
     - name: setup python
       uses: actions/setup-python@v5
       with:
        python-version: "3.10" 
     - name: install dependency 
       run: |
        pip install flake8 
     - name: run flake8
       run: flake8 .
     - name: check run
       run: |
        echo "flake8 run successfully"

  train:
   needs: linter
   if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[runs-on]')
   runs-on: ubuntu-latest
   steps:
    - name: chechout code
      uses: actions/checkout@v4
    - name: python setup
      uses: actions/setup-python@v5
      with:
       python-version: "3.10"
    - name:  train model
      run: python train.py > train.log
    - name: save logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
       name: training_logs
       path: train.log
    - name: evaluate mode
      if: success()
      run: echo "evaluate model automatically"
    - name: cleaning
      if: always()
      run: echo "cleaning done"
      
       
