name: Mock Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mock DVC pull
        run: |
          echo "Pulling data using DVC"
          mkdir -p data
          echo "fake data" > data/data.csv

      - name: Mock train and MLflow logging
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          echo "Training model"
          echo "Logging to MLflow at $MLFLOW_TRACKING_URI"
          echo "mock-run-id-123" > model_info.txt

      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Mock threshold check
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          echo "Checking model threshold"
          echo "Run ID: $(cat model_info.txt)"
          echo "Threshold passed"

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
