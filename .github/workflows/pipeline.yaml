name:
on:
 push:
  branches: [main]
 pull_request: 
jobs:
 linter:
  runs-on: ubuntu-latest
  steps:
   - name: checkout code
     uses: actions/checkout@v4
   - name: setup python
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"
   - name: install dependncy 
     run: pip install flake8
   - name: run flake8
     run: flake8 .
   - name: check code 
     run: echo "code run okay"
 train:
  needs: linter
  if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message , '[runs-on]')
  runs-on: ubuntu-latest
  steps:
   - name: checkout code
     uses: actions/checkout@v4
   - name: setup python 
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"
   - name: train model 
     run: python train.py > train.log
   - name: save logs
     if: failure()
     uses: actions/upload-artifact@v4
     with:
      name: training-logs
      path: train.log

   - name: evaluate
     if: success()
     run: echo  "evaluate automatically"
   - name: cleaning
     if: always()
     run: echo " clean temproray resource"
    
      
     
      
