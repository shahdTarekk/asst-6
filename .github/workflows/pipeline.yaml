name: shahd
on:
 push:
  branches: [main]
jobs:
 linter:
  runs-on: ubuntu-latest
  steps:
   - name: checkout 
     uses: actions/checkout@v4
   - name: setup
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"
   - name: install
     run: pip install flake8 
   - name: run
     run: flake8 .
   - name: cehck 
     run: echo " echck code"
 train: 
  needs: linter
  if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message , '[runs-on]')
  runs-on: ubuntu-latest
  steps:
   - name: checkout 
     uses: actions/checout@v4
   - name: setup
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"

   - name: save
     run: python train.py > train.log
   - name: save logs
     if: failure()
     uses: actions/upload-artifact@v4
     with:
      name: train-logs
      path: train.log

   - name: evaluate
     if: success()
     run: echo "evalaute"

   - name: cleaning
     if: always()
     run: echo "cleanin"
     
