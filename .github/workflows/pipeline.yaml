name:
on:
 push:
  branches: [main]
jobs:
 linter:
  runs-on: ubuntu-latest
  steps:
   - name: checkout code
     uses: actions/checkout@v4
   - name: python setup
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"
   - name: isntall depdencies
     run: |
      pip isntall flake8
   - name: cehk
     run: echo "check code quality"
 train:
  needs: linter
  if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message , '[ runs-on]') 
  runs-on: ubuntu-latest
  steps:
  - name: checkout
    uses: actions/checkout@v4
  - name: setup
    uses: actions/setup-python@v5
    with:
     python-version: "3.10"
  - name: train model
    run: python train.py > train.log

  - name: save logs
    if: failure()
    uses: action/upload-artifact@v4
    with:
     name: train-logs
     path: train.log

  - name: evaluate
    if: success()
    run: echo " evaluate automatically"
  - name: clean
    if: always()
    run: echo "cleaninh"
