name: Mock Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Mock DVC pull
        run: |
          mkdir -p data
          echo "fake data" > data/data.csv

      - name: Mock train and MLflow logging
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          echo "mock-run-id-123" > model_info.txt

      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Mock threshold check
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: cat model_info.txt

      - name: Mock Docker build
        run: docker --version
