name: updated 
on: 
 push:
jobs:
 linter:
  runs-on: ubuntu-latest
  steps:
   - name: checkoutcode
     uses: actions/checkout@v4
   - name: setup 
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"
   - name:
     run: |
      echo "linetr run successfuly"
 train:
  needs: linter
  if: success() && github.ref == 'refs/heads/main && contains(github.event.head_commit.message , '[runs-train]')
  runs-on: ubuntu-latest 
  steps:
   - name: checkoutcode
     uses: actions/checkout@v4
   - name: setup 
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"
   - name: train heavy 
     run: python train.py
   - name: upload logs 
     if: failure()
     uses: actions/upload-artifact@v4
     with:
      name: error-logs
      path: error_logs.txt
   - name: cleaning up 
     if: always()
     run: |
      echo "Cleaning up temporary cloud volumes..."
     
   
   
  
