name: shahd
on:
 push: 
  branches: [main]
jobs:
 linter:
  runs-on: ubuntu-latest
  steps:
   - name: checkout code
     uses: actions/checkout@v4
   - name: setup python 
     uses: actions/setup-python@v5
     with:
       python-version: "3.10"
   - name: install dependncies 
     run: | 
      pip install -r requirements.txt
      pip install flake8 
   - name: run flake8
     run: flake8 .
   - name: check run
     run: |
      echo "flake8 run successfully"

 train:
  needs: linter
  if: success() && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message , '[run-on]')
  runs-on: ubuntu-latest 
  steps:
   - name: checkout code
     uses: actions/checkout@v4
   - name: steup python
     uses: actions/setup-python@v5
     with:
      python-version: "3.10"
   - name: run model
     run: python train.py
   - name: create error log
     if: failure()
     run: echo "Training failed" > error_log.txt
   - name: upload artifact
     if: failure()
     uses: actions/upload-artifact@v4
     with:
      name: error_log
      path: error_log.txt

   - name: check
     if: always()
     run: |
      echo " cleaniny temporrary" 
  
 
